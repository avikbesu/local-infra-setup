# ============================================================
# Airflow Logs — PersistentVolumeClaim
# Binds to airflow-logs-pv (hostPath → compose/container/logs/airflow)
# Must be applied in the `af` namespace BEFORE helm install.
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-logs-pvc
  namespace: af
  labels:
    app: airflow
    component: logs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: airflow
      component: logs

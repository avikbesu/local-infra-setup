# ============================================================
# Airflow DAGs — PersistentVolumeClaim
# Binds to airflow-dags-pv (hostPath → ./dags submodule root)
# Must be applied in the `airflow` namespace BEFORE helm install.
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-dags-pvc
  namespace: airflow
  labels:
    app: airflow
    component: dags
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: airflow
      component: dags
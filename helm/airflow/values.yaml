# ============================================================
# Apache Airflow 3 — Helm Chart Values
# Target: local kind cluster (single-node)
# Executor: LocalExecutor (no Celery/Redis needed locally)
# Metadata DB: External PostgreSQL (postgres-postgresql.db.svc.cluster.local)
# DAGs: Mounted via PVC (airflow-dags-pvc)
#
# Secrets: K8s Secrets created by `make kube-secrets` before `make kube-deploy`
#   airflow-metadata   → DB connection URI
#   airflow-webserver  → webserver/API/JWT secret key
#   airflow-fernet     → Fernet encryption key
# ============================================================

airflowVersion: "3.2.0"
defaultAirflowRepository: apache/airflow
defaultAirflowTag: "3.2.0"
defaultAirflowDigest: ""

# ── Executor ──────────────────────────────────────────────────
executor: "LocalExecutor"

# ── Security contexts ──────────────────────────────────────────
# Airflow runs as uid 50000 (group 0) — set by the apache/airflow image.
# allowPrivilegeEscalation and cap drop are safe: no privileged ports,
# no setuid binaries used at runtime.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 50000
  fsGroup: 0

# ── Images ────────────────────────────────────────────────────
images:
  airflow:
    repository: apache/airflow
    tag: "3.2.0"
    pullPolicy: IfNotPresent

# ── External PostgreSQL ────────────────────────────────────────
# Disable the bundled subchart; use the standalone postgres release
# deployed to the db namespace (see cluster/helm-components.yaml).
postgresql:
  enabled: false

data:
  # Secret must have key `connection` = full SQLAlchemy URI.
  # Created by `make kube-secrets`.
  metadataSecretName: airflow-metadata

# ── Secret keys (from K8s Secrets) ────────────────────────────
# fernetKeySecretName  — chart injects AIRFLOW__CORE__FERNET_KEY
#                        from key `fernet-key`
# webserverSecretKeySecretName — chart injects AIRFLOW__WEBSERVER__SECRET_KEY
#                        from key `webserver-secret-key`
fernetKeySecretName: airflow-fernet
webserverSecretKeySecretName: airflow-webserver

# ── Disable Celery components (not needed for LocalExecutor) ───
redis:
  enabled: false

flower:
  enabled: false

workers:
  replicas: 0

triggerer:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # ── Probe tuning ──────────────────────────────────────────────
  # `airflow jobs check --job-type TriggererJob --local` can take 20-30s on a
  # resource-constrained kind node.  The k8s default timeoutSeconds is 20s,
  # which races the command and always loses → CrashLoopBackOff.
  # Rules: timeoutSeconds must be > command wall-time; periodSeconds must be
  # comfortably larger than timeoutSeconds so probes don't overlap.
  livenessProbe:
    initialDelaySeconds: 90   # wait for DB migrations + process startup
    timeoutSeconds: 60        # command budget; kubelet kills after this
    periodSeconds: 90         # gap between probe attempts
    failureThreshold: 5       # ~7.5 min of grace before pod is restarted

# ── DB Migration Job ──────────────────────────────────────────
# FIX: useHelmHooks: false
#   The default (true) registers this as a Helm pre-install/pre-upgrade hook.
#   When postgres is slow to become ready the hook job fails; Helm then marks
#   the entire release as failed and will not retry the job on the next
#   `helm upgrade --install`, causing a permanent restart loop.
#
#   Setting false turns it into a plain Kubernetes Job deployed as part of
#   the release. The scheduler and api-server already have init containers
#   (waitForMigrations) that block until this Job succeeds, so ordering is
#   preserved without relying on Helm hooks.
migrateDatabaseJob:
  enabled: true
  useHelmHooks: false
  jobAnnotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

# ── Create Admin User Job ─────────────────────────────────────
createUserJob:
  useHelmHooks: false
  jobAnnotations:
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

# ── StatsD ────────────────────────────────────────────────────
statsd:
  enabled: false

# ── DAGs — Persistent Volume Claim ────────────────────────────
# dags_pv.yaml + dags_pvc.yaml must be applied before helm install.
dags:
  persistence:
    enabled: true
    existingClaim: airflow-dags-pvc
    accessMode: ReadWriteMany
  gitSync:
    enabled: false

# ── DAG Processor (Airflow 3.1+ — separate dag-parsing process) ──────────────
dagProcessor:
  enabled: true
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  waitForMigrations:
    enabled: true
  livenessProbe:
    initialDelaySeconds: 90
    timeoutSeconds: 60
    periodSeconds: 90
    failureThreshold: 5

# ── Scheduler ─────────────────────────────────────────────────
scheduler:
  replicas: 1
  waitForMigrations:
    enabled: true
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  livenessProbe:
    initialDelaySeconds: 90   # wait for DB migrations + process startup
    timeoutSeconds: 60        # command budget; kubelet kills after this
    periodSeconds: 90         # gap between probe attempts
    failureThreshold: 5       # ~7.5 min of grace before pod is restarted

# ── API Server (Airflow 3 — replaces webserver) ───────────────
apiServer:
  replicas: 1
  waitForMigrations:
    enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 250m
      memory: 384Mi
  service:
    type: ClusterIP
    ports:
      - name: airflow-ui
        port: 8080
        targetPort: 8080

# ── Logs ──────────────────────────────────────────────────────
# Task logs are stored on a PVC backed by a hostPath mount in kind-config.yaml.
# This means logs survive pod restarts and can be read from the host at
# compose/container/logs/airflow (same dir used by Docker Compose).
# PV/PVC applied via pre_manifests in cluster/helm-components.yaml.
logs:
  persistence:
    enabled: true
    existingClaim: airflow-logs-pvc

# ── Log Groomer ───────────────────────────────────────────────
logGroomer:
  enabled: false

# ── RBAC ──────────────────────────────────────────────────────
rbac:
  create: true
  createSCCRoleBinding: false

# ── Service Account ───────────────────────────────────────────
serviceAccount:
  create: true
  name: airflow

# ── Extra RBAC — batch Job permissions ────────────────────────
extraObjects:
  - apiVersion: rbac.authorization.k8s.io/v1
    kind: Role
    metadata:
      name: airflow-batch-role
      namespace: af
    rules:
      - apiGroups: ["batch"]
        resources: ["jobs", "jobs/status"]
        verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
      - apiGroups: [""]
        resources: ["pods/log"]
        verbs: ["get", "list"]
      - apiGroups: [""]
        resources: ["pods/exec"]
        verbs: ["create", "get"]
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["get", "list"]

  - apiVersion: rbac.authorization.k8s.io/v1
    kind: RoleBinding
    metadata:
      name: airflow-batch-rolebinding
      namespace: af
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: airflow-batch-role
    subjects:
      - kind: ServiceAccount
        name: airflow
        namespace: af

# ── Ingress (disabled — use port-forward locally) ─────────────
ingress:
  web:
    enabled: false
  flower:
    enabled: false

# ── Env Vars ──────────────────────────────────────────────────
env:
  - name: AIRFLOW__CORE__LOAD_EXAMPLES
    value: "False"
  - name: AIRFLOW__LOGGING__LOGGING_LEVEL
    value: "INFO"
  - name: AIRFLOW__API__AUTH_BACKENDS
    value: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
  # FAB auth manager — required for Airflow 3 UI login
  - name: AIRFLOW__CORE__AUTH_MANAGER
    value: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
  # Scheduler → API Server URL for Task Execution Interface (Airflow 3)
  - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
    value: "http://airflow-api-server:8080/execution/"
  # ── KubernetesPodOperator log capture ─────────────────────────
  - name: AIRFLOW__KUBERNETES__DELETE_WORKER_PODS_ON_FAILURE
    value: "False"
  - name: AIRFLOW__KUBERNETES__LOG_EVENTS_ON_FAILURE
    value: "True"

# ── Extra Env Vars (from K8s Secrets) ─────────────────────────
# These three all use the same secret key value; injected here explicitly
# because they are additional Airflow 3 fields beyond what
# webserverSecretKeySecretName injects by default.
extraEnv: |
  - name: AIRFLOW__API__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: airflow-webserver
        key: webserver-secret-key
  - name: AIRFLOW__API_AUTH__JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: airflow-webserver
        key: webserver-secret-key
  - name: AIRFLOW__CORE__INTERNAL_API_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: airflow-webserver
        key: webserver-secret-key

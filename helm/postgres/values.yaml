# ============================================================
# PostgreSQL — Helm Chart Values  (bitnami/postgresql)
# Namespace: db
# Accessed by Airflow as: postgres-postgresql.db.svc.cluster.local:5432
#
# Secrets: K8s Secret 'postgres-credentials' in namespace 'db'
#   created by `make kube-secrets` before `make kube-deploy`
#   Keys:  password          → auth.username user
#          postgres-password → postgres superuser
# ============================================================

auth:
  username: airflow
  database: airflow
  existingSecret: postgres-credentials
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  service:
    type: ClusterIP
    ports:
      postgresql: 5432

  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

readReplicas:
  replicaCount: 0

backup:
  enabled: false

# ── Init scripts ──────────────────────────────────────────────
# Creates the iceberg catalog database in addition to the default
# airflow database. Bitnami executes .sh files during first-start
# initdb. The script is idempotent: no-ops if iceberg already exists.
initdbScripts:
  00-iceberg.sh: |
    #!/bin/sh
    set -e
    DB_EXISTS=$(psql --username "$POSTGRES_USER" -Atc \
      "SELECT 1 FROM pg_database WHERE datname = 'iceberg'")
    if [ "$DB_EXISTS" != "1" ]; then
      psql --username "$POSTGRES_USER" -c "CREATE DATABASE iceberg"
      echo "Created database: iceberg"
    else
      echo "Database iceberg already exists, skipping."
    fi

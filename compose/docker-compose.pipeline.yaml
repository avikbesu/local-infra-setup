# ============================================================
# docker-compose.pipeline.yaml
# All Airflow services — Airflow 3 with LocalExecutor.
#
# Airflow 3 architectural changes vs Airflow 2:
#   - `webserver` is replaced by `api-server`
#   - api-server serves the UI (React), REST API, and the
#     Task Execution Interface (tasks no longer hit the DB directly)
#   - Scheduler must know the api-server URL via
#     AIRFLOW__CORE__EXECUTION_API_SERVER_URL
#   - Secret key config moved from [webserver] → [api] section
#
# Profiles:
#   pipeline  — airflow-init + scheduler  (headless execution)
#
# Typical usage: 
#   with UI: docker compose --profile pipeline up -d
# ============================================================

# --------------- Airflow shared anchors ---------------------
x-airflow-common: &airflow-common
  image: apache/airflow:3.2.0
  restart: unless-stopped
  profiles: [pipeline]
  user: "${AIRFLOW_UID:-50000}:0"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1G
      reservations:
        cpus: "0.25"
        memory: 512M
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.local}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    # api-server URL used by scheduler/tasks for Task Execution Interface (Airflow 3)
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    # ── TEI internal auth — THIS is what task subprocesses use ──
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # Secret key moved from [webserver] to [api] in Airflow 3
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}   # ← was AIRFLOW__API__AUTH__JWT_SECRET (wrong)
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW_VAR_ENVIRONMENT: local
    # Creating connection
    # AIRFLOW_CONN_AIRFLOW_API: "http://${AIRFLOW_ADMIN_USER}:${AIRFLOW_ADMIN_PASSWORD}@airflow-webserver:8080"   # Added logic within init 
    AIRFLOW_VAR_EXEC_ENV: compose

  volumes:
    - ${PWD}/dags/dags:/opt/airflow/dags:ro
    - ${PWD}/compose/container/logs/airflow:/opt/airflow/logs:rw
    - ${PWD}/compose/container/plugins/airflow:/opt/airflow/plugins:ro
    - ${PWD}/scripts:/opt/airflow/scripts/infra:ro
  # Fluentd log driver — active when `--profile logging` is also started.
  # fluentd-async: "true" means airflow containers start even if fluentd is
  # temporarily unreachable; Docker buffers locally and retries the connection.
  # The address is localhost:24224 because Docker's log driver runs on the HOST
  # (not inside the container network) and connects to fluentd via its host port.
  # To enable: start with `make up PROFILE=storage,logging,pipeline`
  logging: &airflow-logging
    driver: fluentd
    options:
      fluentd-address: "localhost:${FLUENTD_PORT:-24224}"
      fluentd-async:   "true"
      tag:             "airflow.{{.Name}}"   # e.g. airflow.airflow-scheduler-1
  depends_on: &airflow-common-depends
    postgres:
      condition: service_healthy

x-airflow-healthcheck: &airflow-healthcheck
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 45s



# --------------- Services -----------------------------------
services:

  # -- One-shot: DB migration + admin user creation ----------
  airflow-init:
    <<: *airflow-common
    restart: no
    command:
      - bash
      - -c
      - |
          set -e
          echo "⏳ Running DB migrations..."
          airflow db migrate

          echo "👤 Creating admin user (skips if already exists)..."
          if ! airflow users list 2>/dev/null | grep -qF "${AIRFLOW_ADMIN_USER:-admin}"; then
            airflow users create \
              --username "${AIRFLOW_ADMIN_USER:-admin}" \
              --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
              --firstname Admin \
              --lastname User \
              --role Admin \
              --email "${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"
          else
            echo "   ↳ user '${AIRFLOW_ADMIN_USER:-admin}' already exists — skipping"
          fi

          echo "🔗 Registering airflow_api connection (skips if already exists)..."
          if ! airflow connections get airflow_api >/dev/null 2>&1; then
            airflow connections add "airflow_api" \
              --conn-type "http" \
              --conn-host "airflow-api-server" \
              --conn-port "8080" \
              --conn-login "${AIRFLOW_ADMIN_USER:-admin}" \
              --conn-password "${AIRFLOW_ADMIN_PASSWORD:-admin}"
          else
            echo "   ↳ connection 'airflow_api' already exists — skipping"
          fi

          echo "✅ Init complete."
    healthcheck:
      disable: true

  # -- Scheduler: triggers DAG runs + executes tasks locally -
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:          # ← scheduler needs TEI to be reachable
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob 2>&1 || exit 1"]
      <<: *airflow-healthcheck

  # -- API Server: UI (React) + REST API + Task Execution IF -
  # Replaces `webserver` from Airflow 2. Run as: airflow api-server
  airflow-api-server:
    <<: *airflow-common
    command: api-server
    container_name: airflow-api-server
    ports:
      - "${AIRFLOW_API_SERVER_PORT:-8080}:8080"
    depends_on:
      <<: *airflow-common-depends
      airflow-init:                # ← only needs DB to be migrated
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      <<: *airflow-healthcheck

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      <<: *airflow-healthcheck
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      <<: *airflow-healthcheck
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully

volumes:
  plugins:

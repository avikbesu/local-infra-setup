# =============================================================================
# nginx.conf — main config for local-infra-setup reverse proxy
#
# Design notes:
#   - Uses Docker's embedded DNS resolver (127.0.0.11) with a short TTL so
#     nginx starts even when upstream containers are not yet healthy. Upstreams
#     are resolved lazily per-request via `set $upstream ...` variables, which
#     prevents nginx from treating a missing container as a fatal start error.
#   - All upstream hostnames match the Docker Compose service names.
#   - Prefix-stripping is applied (trailing slash on proxy_pass) so downstream
#     services receive requests at their own root paths.
#   - WebSocket upgrade headers are included on all locations (required by
#     MinIO Console; harmless on other services).
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        application/javascript                js;
        # ... add others as needed
    }
    # include /etc/nginx/mime.types; 
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Use Docker's embedded DNS so upstream hostnames resolve at request time,
    # not at nginx start. This allows nginx to start before upstream services
    # are healthy and auto-recover when they come up.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Shared proxy headers applied in every location block via include.
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    # WebSocket support (required for MinIO Console; harmless elsewhere)
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        $connection_upgrade;

    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;
    proxy_buffer_size      16k;
    proxy_buffers          4 32k;

    # WebSocket connection upgrade map
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ---------------------------------------------------------------------------
    # Include per-service server blocks
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
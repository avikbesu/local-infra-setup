# =============================================================================
# conf.d/default.conf — route table for local-infra-setup reverse proxy
#
# Service map:
#   /health          → nginx stub (liveness probe only)
#   /trino/          → trino:8080          (Trino Web UI + REST API)
#   /airflow/        → airflow-api-server:8080   (Airflow UI + REST API)
#   /iceberg/        → iceberg-rest:8181   (Iceberg REST Catalog API)
#   /minio/          → minio:9001          (MinIO Console — WebSocket)
#   /minio-api/      → minio:9000          (MinIO S3-compatible API)
#
# NOTE: Prefix-stripping (trailing slash on proxy_pass) is used. This means
# a request to /trino/ui/login is forwarded to trino:8080/ui/login.
# Trino and Airflow generate absolute redirect URLs that may include the
# original host — this works correctly for local browser access on localhost.
# =============================================================================

server {
    listen       80;
    server_name  localhost;

    # -------------------------------------------------------------------------
    # Health endpoint — used by Docker healthcheck: GET /health → 200
    # -------------------------------------------------------------------------
    location = /health {
        access_log  off;
        return 200 "ok\n";
        add_header  Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # Landing page redirect — /  →  brief service index
    # -------------------------------------------------------------------------
    location = / {
        return 200 '<!DOCTYPE html>
<html>
<head><title>local-infra-setup</title></head>
<body>
<h2>local-infra-setup — service index</h2>
<ul>
  <li><a href="/trino/ui/">Trino UI</a></li>
  <li><a href="/airflow/">Airflow UI</a></li>
  <li><a href="/minio/">MinIO Console</a></li>
  <li><a href="/iceberg/">Iceberg REST Catalog</a></li>
  <li><a href="/minio-api/">MinIO S3 API</a></li>
</ul>
</body>
</html>';
        add_header Content-Type text/html;
    }

    # -------------------------------------------------------------------------
    # Trino  →  http://trino:8080/
    # -------------------------------------------------------------------------
    location /trino/ {
        set $upstream_trino http://trino:8080;
        proxy_pass $upstream_trino/;

        # Trino REST API can return large result sets
        proxy_read_timeout   300s;
        proxy_buffer_size    64k;
        proxy_buffers        8 64k;
        proxy_busy_buffers_size 128k;
    }

    # -------------------------------------------------------------------------
    # Airflow  →  http://airflow-api-server:8080/
    # NOTE: Airflow 3 webserver base_url must be set to http://localhost/airflow
    # in .env: AIRFLOW__WEBSERVER__BASE_URL=http://localhost/airflow
    # -------------------------------------------------------------------------
    location /airflow/ {
        set $upstream_airflow http://airflow-api-server:8080;
        proxy_pass $upstream_airflow/;
    }

    # -------------------------------------------------------------------------
    # Iceberg REST Catalog  →  http://iceberg-rest:8181/
    # -------------------------------------------------------------------------
    location /iceberg/ {
        set $upstream_iceberg http://iceberg-rest:8181;
        proxy_pass $upstream_iceberg/;
    }

    # -------------------------------------------------------------------------
    # MinIO Console  →  http://minio:9001/
    # Requires WebSocket support (already set globally in nginx.conf).
    # -------------------------------------------------------------------------
    location /minio/ {
        set $upstream_minio_console http://minio:9001;
        proxy_pass $upstream_minio_console/;

        # MinIO Console requires these exact headers for WebSocket auth
        proxy_set_header  X-NginX-Proxy true;
        real_ip_header    X-Real-IP;
    }

    # -------------------------------------------------------------------------
    # MinIO S3 API  →  http://minio:9000/
    # Useful for tools/scripts that target the S3 API through the proxy.
    # -------------------------------------------------------------------------
    location /minio-api/ {
        set $upstream_minio_api http://minio:9000;
        proxy_pass $upstream_minio_api/;

        # S3 API can upload large objects
        client_max_body_size 0;
        proxy_read_timeout   300s;
    }
}
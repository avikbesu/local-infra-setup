# ============================================================
# docker-compose.observability.yaml
# Metrics collection and visualisation via Prometheus + Grafana.
# Container metrics are scraped from cAdvisor.
# Profile: observability
#
# Start with:
#   make obs-up
# or:
#   docker compose --profile observability up -d
#
# Grafana UI  → http://localhost:${GRAFANA_PORT:-3000}
#   Login: admin / (see .env.local for GRAFANA_ADMIN_PASSWORD)
#
# Prometheus  → http://localhost:${PROMETHEUS_PORT:-9090}
#
# cAdvisor scrapes all running containers and exposes them as
# Prometheus metrics; it is internal-only (no host port).
# ============================================================

services:
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    profiles: [observability]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    profiles: [observability]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env.local}
      GF_PATHS_PROVISIONING:      /etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M

  # cAdvisor exposes per-container CPU, memory, network, and filesystem
  # metrics to Prometheus. Requires privileged mode to read cgroup data.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}
    profiles: [observability]
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

volumes:
  prometheus-data:
  grafana-data:

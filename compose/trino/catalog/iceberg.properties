# ============================================================
# Trino — catalog/iceberg.properties
# Iceberg connector via the REST catalog (tabulario/iceberg-rest).
# Warehouse data is stored in MinIO (S3-compatible).
#
# Credentials are injected via environment variable substitution
# using Trino's ${ENV:VAR_NAME} syntax (supported since Trino 363).
# The env vars are set in docker-compose.query.yaml.
# ============================================================

connector.name=iceberg

# ── REST Catalog ──────────────────────────────────────────
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181

# ── File format ───────────────────────────────────────────
iceberg.file-format=PARQUET

# ── S3 / MinIO ────────────────────────────────────────────
# Uses native S3 filesystem (preferred over Hadoop S3A in Trino 435+).
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=${ENV:AWS_REGION}
s3.path-style-access=true
s3.aws-access-key=${ENV:AWS_ACCESS_KEY_ID}
s3.aws-secret-key=${ENV:AWS_SECRET_ACCESS_KEY}
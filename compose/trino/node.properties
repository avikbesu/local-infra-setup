# ============================================================
# Trino — node.properties
# Static node configuration for the local dev coordinator.
# node.id must be unique per node; a fixed UUID is fine for
# single-node local development.
# ============================================================

node.environment=local
node.id=00000000-0000-0000-0000-000000000001
node.data-dir=/data/trino
plugin.dir=/usr/lib/trino/plugin
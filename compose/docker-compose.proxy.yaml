# ---------------------------------------------------------------------------
# Profile: proxy
# Nginx reverse proxy — unified HTTP entry point for all infra UIs & APIs.
#
# Usage (alongside other profiles):
#   docker compose \
#     -f compose/docker-compose.storage.yaml \
#     -f compose/docker-compose.db.yaml \
#     -f compose/docker-compose.logging.yaml \
#     -f compose/docker-compose.query.yaml \
#     -f compose/docker-compose.pipeline.yaml \
#     -f compose/docker-compose.proxy.yaml \
#     --profile storage --profile query --profile pipeline --profile proxy \
#     up -d
#
# Or use: make compose-proxy-up (starts full stack + proxy)
#
# Routes (all via http://localhost:${NGINX_PORT:-80}):
#   /trino/          → trino:8080
#   /airflow/        → airflow-api-server:8080
#   /iceberg/        → iceberg-rest:8181
#   /minio/          → minio:9001  (MinIO Console — WebSocket-aware)
#   /minio-api/      → minio:9000  (MinIO S3 API)
#   /health          → nginx stub_status (nginx liveness only)
# ---------------------------------------------------------------------------

services:
  nginx:
    image: nginx:${NGINX_IMAGE_TAG:-1.27-alpine}
    container_name: nginx
    profiles: [proxy]
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ${BASE_DIR}/../compose/nginx/:/etc/nginx/:ro
      - ${BASE_DIR}/../compose/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
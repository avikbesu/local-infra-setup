# ============================================================
# Java Util Logging config for tabulario/iceberg-rest
# Suppresses the startup line that dumps the full properties
# map (including jdbc.password, AWS keys) at INFO level.
# ============================================================

# ── Handlers ─────────────────────────────────────────────────
handlers = java.util.logging.ConsoleHandler
.level  = INFO

java.util.logging.ConsoleHandler.level     = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format   = %1$tFT%1$tT.%1$tL %4$s [%3$s] - %5$s%n

# ── Suppress credential-dumping logger ───────────────────────
# RESTCatalogServer.createCatalog() logs the full properties
# map at INFO — set to WARNING to suppress that line only.
org.apache.iceberg.rest.RESTCatalogServer.level = WARNING

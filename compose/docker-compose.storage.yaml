# ============================================================
# docker-compose.storage.yaml
# Object storage services — start with profile: storage
#   docker compose --profile storage up
# ============================================================

services:
  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    profiles:
      - storage
      # - pipeline
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.local}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  # One-shot container that creates all required buckets on first run.
  # Safe to re-run — mc mb --ignore-existing is idempotent.
  #
  # Buckets created:
  #   airflow-logs          ← Fluentd S3 sink for Airflow container logs
  #   airflow-data          ← General Airflow data / XCom storage
  #   iceberg-warehouse     ← Iceberg REST catalog warehouse root
  minio-init:
    image: minio/mc:${MC_VERSION}
    profiles:
      - storage
    restart: no
    security_opt:
      - no-new-privileges:true
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.local}
      MINIO_BUCKETS: ${MINIO_BUCKETS:-airflow-logs,airflow-data,iceberg-warehouse}
    entrypoint: >
      /bin/sh -c "
        set -e;
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        IFS=',';
        for bucket in $$MINIO_BUCKETS; do
          bucket=$$(echo \"$$bucket\" | tr -d ' ');
          [ -z \"$$bucket\" ] && continue;
          mc mb --ignore-existing \"local/$$bucket\";
          echo \"  ✔ bucket ready: $$bucket\";
        done;
        echo 'All buckets ready.';
      "

volumes:
  minio-data:
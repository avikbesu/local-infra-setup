# ============================================================
# docker-compose.storage.yaml
# Object storage services — start with profile: storage
#   docker compose --profile storage up
# ============================================================

services:
  minio:
    image: minio/minio:latest
    profiles: 
      - storage
      # - pipeline
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.local}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # One-shot container that creates all required buckets on first run.
  # Safe to re-run — mc mb --ignore-existing is idempotent.
  #
  # Buckets created:
  #   airflow-logs          ← Fluentd S3 sink for Airflow container logs
  #   airflow-data          ← General Airflow data / XCom storage
  #   iceberg-warehouse     ← Iceberg REST catalog warehouse root
  minio-init:
    image: minio/mc:latest
    profiles:
      - storage
    restart: no
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_BUCKETS: ${MINIO_BUCKETS:-airflow-logs,airflow-data,iceberg-warehouse}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env.local};
        for bucket in $$(echo $$MINIO_BUCKETS | tr ',' ' '); do
          mc mb --ignore-existing local/$$bucket;
          echo \"  ✔ bucket ready: $$bucket\";
        done;
        echo 'All buckets ready.';
      "

volumes:
  minio-data:
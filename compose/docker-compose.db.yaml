# ============================================================
# docker-compose.db.yaml
# Database services — start with profile: db
#   docker compose --profile db up
#
# Services:
#   postgres       — persistent Postgres instance
#   postgres-init  — one-shot: runs config/postgres/init.sql after
#                    postgres is healthy. Creates any databases that
#                    don't exist yet (e.g. the `iceberg` catalog DB).
#                    Safe to re-run — all statements are idempotent.
# ============================================================

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    profiles:
      - "db"
      - "pipeline"
      - "query"
    container_name: postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.local}
      POSTGRES_DB:       ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${BASE_DIR}/../config/postgres:/opt/init/sql:rw
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow} -d ${POSTGRES_DB:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M

  # ── One-shot DB provisioner ───────────────────────────────
  # Runs every SQL file in config/postgres/ that matches [0-9]*.sql,
  # in filename-sorted order (1-databases.sql, 2-extensions.sql, …).
  # Uses psql -f (file mode) per script — no shell pipes or quoting issues.
  #
  # To add a new init step: drop a file named N-description.sql into
  # config/postgres/ and it will be picked up on the next `make up`.
  # All scripts must be idempotent (IF NOT EXISTS, CREATE OR REPLACE, etc.)
  #
  # Downstream services that need a specific database must declare:
  #   depends_on:
  #     postgres-init:
  #       condition: service_completed_successfully
  postgres-init:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    security_opt:
      - no-new-privileges:true
    profiles:
      - "db"
      # pipeline profile intentionally excluded:
      #   Airflow only uses the `airflow` DB, which postgres creates on startup.
      #   The `iceberg` DB (created here) is only required by iceberg-rest (query profile).
      #   Including this in `pipeline` would add an unnecessary wait on every `make pipeline`.
      #
      # IMPORTANT: always use `make query` (not raw --profile pipeline --profile query)
      # when combining both stacks — `make query` explicitly includes --profile db so
      # this init container runs. Raw --profile pipeline --profile query skips it, and
      # iceberg-rest will fail with "database does not exist".
      - "query"
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.local}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ${BASE_DIR}/../config/postgres:/opt/init:ro
    # set -e aborts on the first failing script so errors are never silently swallowed.
    entrypoint: 
      - bash
      - -ec
      - /opt/init/setup.sh

volumes:
  postgres-data: